<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tic-Tac-Toe (React)</title>

    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      #root { padding: 16px; }

      .game { display: flex; gap: 24px; flex-wrap: wrap; }
      .status { margin-bottom: 12px; font-weight: 600; }

      .board-row { display: flex; }
      .square {
        width: 64px; height: 64px;
        margin: 0;
        border: 1px solid rgba(255,255,255,0.25);
        background: rgba(255,255,255,0.06);
        color: white;
        font-size: 28px;
        font-weight: 700;
        cursor: pointer;
      }
      .square:hover { background: rgba(255,255,255,0.1); }
      .game-info button {
        cursor: pointer;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        padding: 6px 10px;
        border-radius: 10px;
      }
      .game-info ol { padding-left: 18px; margin: 0; }
      .game-info li { margin: 8px 0; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useState } from "https://esm.sh/react@18";
      import { createRoot } from "https://esm.sh/react-dom@18/client";

      function Square({ value, onSquareClick }) {
        return (
          <button className="square" onClick={onSquareClick}>
            {value}
          </button>
        );
      }

      function Board({ xIsNext, squares, onPlay }) {
        function handleClick(i) {
          if (calculateWinner(squares) || squares[i]) return;

          const nextSquares = squares.slice();
          nextSquares[i] = xIsNext ? "X" : "O";
          onPlay(nextSquares);
        }

        const winner = calculateWinner(squares);
        const status = winner ? "Winner: " + winner : "Next player: " + (xIsNext ? "X" : "O");

        return (
          <>
            <div className="status">{status}</div>
            <div className="board-row">
              <Square value={squares[0]} onSquareClick={() => handleClick(0)} />
              <Square value={squares[1]} onSquareClick={() => handleClick(1)} />
              <Square value={squares[2]} onSquareClick={() => handleClick(2)} />
            </div>
            <div className="board-row">
              <Square value={squares[3]} onSquareClick={() => handleClick(3)} />
              <Square value={squares[4]} onSquareClick={() => handleClick(4)} />
              <Square value={squares[5]} onSquareClick={() => handleClick(5)} />
            </div>
            <div className="board-row">
              <Square value={squares[6]} onSquareClick={() => handleClick(6)} />
              <Square value={squares[7]} onSquareClick={() => handleClick(7)} />
              <Square value={squares[8]} onSquareClick={() => handleClick(8)} />
            </div>
          </>
        );
      }

      function Game() {
        const [history, setHistory] = useState([Array(9).fill(null)]);
        const [currentMove, setCurrentMove] = useState(0);
        const xIsNext = currentMove % 2 === 0;
        const currentSquares = history[currentMove];

        function handlePlay(nextSquares) {
          const nextHistory = [...history.slice(0, currentMove + 1), nextSquares];
          setHistory(nextHistory);
          setCurrentMove(nextHistory.length - 1);
        }

        function jumpTo(nextMove) {
          setCurrentMove(nextMove);
        }

        const moves = history.map((squares, move) => {
          const description = move > 0 ? "Go to move #" + move : "Go to game start";
          return (
            <li key={move}>
              <button onClick={() => jumpTo(move)}>{description}</button>
            </li>
          );
        });

        return (
          <div className="game">
            <div className="game-board">
              <Board xIsNext={xIsNext} squares={currentSquares} onPlay={handlePlay} />
            </div>
            <div className="game-info">
              <ol>{moves}</ol>
            </div>
          </div>
        );
      }

      function calculateWinner(squares) {
        const lines = [
          [0, 1, 2],
          [3, 4, 5],
          [6, 7, 8],
          [0, 3, 6],
          [1, 4, 7],
          [2, 5, 8],
          [0, 4, 8],
          [2, 4, 6],
        ];
        for (let i = 0; i < lines.length; i++) {
          const [a, b, c] = lines[i];
          if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) return squares[a];
        }
        return null;
      }

      createRoot(document.getElementById("root")).render(<Game />);
    </script>
  </body>
</html>
